<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人員管理 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="booking-card" style="max-width: 800px;">
    <h2 class="main-title">人員權限管理</h2>
    
    <div class="section-title" id="formTitle">新增工作人員</div>
    <div class="info-grid card-padding">
        <input type="hidden" id="editUid">
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="staffName" placeholder="輸入員工姓名">
        </div>
        <div class="form-group">
            <label>權限角色</label>
            <select id="staffRole">
                <option value="stylist">美髮師 (Stylist)</option>
                <option value="admin">管理者 (Admin)</option>
            </select>
        </div>
        <div class="form-group full-width">
            <label>電子郵件 (登入帳號)</label>
            <input type="email" id="staffEmail" placeholder="example@kmuh.org.tw">
        </div>
        <div class="btn-group full-width" style="flex-direction: row; gap: 10px;">
            <button onclick="saveStaff()" id="saveBtn" class="btn-submit" style="flex: 2;">儲存人員資訊</button>
            <button onclick="resetStaffForm()" id="cancelEditBtn" class="btn-cancel" style="flex: 1; display: none; padding: 18px;">取消編輯</button>
        </div>
    </div>

    <div class="section-title">目前人員清單</div>
    <div id="staffListArea" class="flex-container" style="flex-direction: column;">
        </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, doc, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 載入清單
    async function loadStaff() {
        const staffArea = document.getElementById('staffListArea');
        staffArea.innerHTML = '<p class="loading-text">載入中...</p>';
        
        const snap = await getDocs(query(collection(db, "Users"), orderBy("name")));
        staffArea.innerHTML = '';
        
        snap.forEach(sDoc => {
            const d = sDoc.data();
            const roleText = d.role === 'admin' ? '管理者' : '美髮師';
            staffArea.innerHTML += `
                <div class="item-card" style="flex: 0 0 100%; margin-bottom: 10px;">
                    <div class="item-left">
                        <strong>${d.name}</strong> 
                        <span style="margin-left:10px; font-size:0.8rem; color:#64748b;">${roleText} (${d.email})</span>
                    </div>
                    <div>
                        <button onclick="editStaff('${sDoc.id}', '${d.name}', '${d.email}', '${d.role}')" class="btn-small">編輯</button>
                        <button onclick="deleteStaff('${sDoc.id}')" class="btn-small-urgent">刪除</button>
                    </div>
                </div>`;
        });
    }

    // 儲存人員 (新增或修改)
    window.saveStaff = async () => {
        const uid = document.getElementById('editUid').value;
        const name = document.getElementById('staffName').value;
        const email = document.getElementById('staffEmail').value;
        const role = document.getElementById('staffRole').value;

        if(!name || !email) return alert("請填寫完整資訊");

        try {
            // 注意：Auth 帳號需在 Firebase Console 手動建立，此處僅同步 Firestore 資料
            const targetId = uid || email.replace('.', '_'); // 若無 UID 則暫用 Email 轉化
            await setDoc(doc(db, "Users", targetId), { name, email, role }, { merge: true });
            alert("人員資訊已更新");
            resetStaffForm();
            loadStaff();
        } catch (e) { alert("儲存失敗"); }
    };

    window.editStaff = (id, name, email, role) => {
        document.getElementById('formTitle').innerText = "編輯人員資訊";
        document.getElementById('editUid').value = id;
        document.getElementById('staffName').value = name;
        document.getElementById('staffEmail').value = email;
        document.getElementById('staffRole').value = role;
        document.getElementById('cancelEditBtn').style.display = "block";
    };

    window.resetStaffForm = () => {
        document.getElementById('formTitle').innerText = "新增工作人員";
        document.getElementById('editUid').value = "";
        document.getElementById('staffName').value = "";
        document.getElementById('staffEmail').value = "";
        document.getElementById('cancelEditBtn').style.display = "none";
    };

    window.deleteStaff = async (id) => {
        if(confirm("確定刪除此人員？此動作不會刪除登入帳號，僅移除系統權限。")) {
            await deleteDoc(doc(db, "Users", id));
            loadStaff();
        }
    };

    loadStaff();
</script>
</body>
</html>
