<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班管理 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        .admin-table th, .admin-table td { border: 1px solid var(--border); padding: 12px; text-align: center; vertical-align: top; }
        .admin-table th { background: #f8fafc; color: #64748b; font-size: 0.9rem; }
        .staff-checkbox-group { text-align: left; display: flex; flex-direction: column; gap: 5px; }
        .staff-label { font-size: 0.9rem; display: flex; align-items: center; cursor: pointer; padding: 4px; border-radius: 4px; }
        .staff-label:hover { background: #f1f5f9; }
        .staff-label input { margin-right: 8px; width: 16px; height: 16px; }
    </style>
</head>
<body>

<div class="booking-card" style="max-width: 1000px; margin: 10px auto;">
    <h2 class="main-title">人員週班表設定</h2>
    <p style="text-align: center; color: #64748b; margin-bottom: 20px;">此處設定每週循環的固定班表，勾選之人員將出現在預約下拉選單中。</p>

    <div class="card-padding" style="overflow-x: auto;">
        <table class="admin-table">
            <thead>
                <tr id="schedHead">
                    <th>時段</th>
                    </tr>
            </thead>
            <tbody id="schedBody">
                </tbody>
        </table>
    </div>

    <div class="btn-group" style="margin-top: 30px;">
        <button onclick="saveSchedule()" class="btn-submit">儲存排班設定</button>
        <p id="saveMsg" style="text-align: center; color: var(--secondary); display: none; margin-top: 10px;">設定已成功儲存！</p>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        doc, getDoc, setDoc, collection, getDocs, query, where 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const days = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
    const slots = [
        { key: 'amStaffs', label: '上午上班人員' },
        { key: 'pmStaffs', label: '下午上班人員' }
    ];
    let allStylists = [];

    async function initSchedule() {
        try {
            // 1. 抓取所有角色為 'stylist' 的人員
            const q = query(collection(db, "Users"), where("role", "==", "stylist"));
            const userSnap = await getDocs(q);
            allStylists = [];
            userSnap.forEach(doc => {
                allStylists.push({ id: doc.id, name: d().name || d().email });
                function d() { return doc.data(); }
            });

            // 2. 繪製表格表頭
            const headRow = document.getElementById('schedHead');
            days.forEach(day => {
                const th = document.createElement('th');
                th.innerText = day;
                headRow.appendChild(th);
            });

            // 3. 繪製表格內容 (上午/下午列)
            const body = document.getElementById('schedBody');
            slots.forEach(slot => {
                let html = `<tr><td style="font-weight:bold; background:#f8fafc;">${slot.label}</td>`;
                days.forEach((_, dayIdx) => {
                    html += `<td><div class="staff-checkbox-group" id="cell-${dayIdx}-${slot.key}">`;
                    allStylists.forEach(s => {
                        html += `
                            <label class="staff-label">
                                <input type="checkbox" class="sched-check" data-day="${dayIdx}" data-slot="${slot.key}" value="${s.name}">
                                ${s.name}
                            </label>
                        `;
                    });
                    html += `</div></td>`;
                });
                html += `</tr>`;
                body.innerHTML += html;
            });

            // 4. 載入現有的 WebConfig 設定並打勾
            const configSnap = await getDoc(doc(db, "Settings", "WebConfig"));
            if (configSnap.exists()) {
                const data = configSnap.data();
                days.forEach((_, dayIdx) => {
                    const dayData = data[`day${dayIdx}`];
                    if (dayData) {
                        // 上午打勾
                        if (dayData.amStaffs) {
                            dayData.amStaffs.forEach(name => {
                                const cb = document.querySelector(`.sched-check[data-day="${dayIdx}"][data-slot="amStaffs"][value="${name}"]`);
                                if (cb) cb.checked = true;
                            });
                        }
                        // 下午打勾
                        if (dayData.pmStaffs) {
                            dayData.pmStaffs.forEach(name => {
                                const cb = document.querySelector(`.sched-check[data-day="${dayIdx}"][data-slot="pmStaffs"][value="${name}"]`);
                                if (cb) cb.checked = true;
                            });
                        }
                    }
                });
            }

        } catch (e) {
            console.error("初始化排班失敗:", e);
            alert("載入資料失敗，請檢查權限設定。");
        }
    }

    // 儲存排班 (更新 WebConfig 中的特定欄位)
    window.saveSchedule = async () => {
        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerText = "正在儲存...";

        try {
            // 先讀取舊有的設定，以免覆蓋掉時間設定 (amEnd/pmEnd)
            const docRef = doc(db, "Settings", "WebConfig");
            const configSnap = await getDoc(docRef);
            let currentConfig = configSnap.exists() ? configSnap.data() : {};

            days.forEach((_, dayIdx) => {
                const dayKey = `day${dayIdx}`;
                if (!currentConfig[dayKey]) currentConfig[dayKey] = {};

                // 收集勾選的人員
                currentConfig[dayKey].amStaffs = Array.from(
                    document.querySelectorAll(`.sched-check[data-day="${dayIdx}"][data-slot="amStaffs"]:checked`)
                ).map(el => el.value);

                currentConfig[dayKey].pmStaffs = Array.from(
                    document.querySelectorAll(`.sched-check[data-day="${dayIdx}"][data-slot="pmStaffs"]:checked`)
                ).map(el => el.value);
            });

            await setDoc(docRef, currentConfig);
            
            const msg = document.getElementById('saveMsg');
            msg.style.display = "block";
            setTimeout(() => { msg.style.display = "none"; }, 3000);
        } catch (e) {
            alert("儲存失敗: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "儲存排班設定";
        }
    };

    initSchedule();
</script>

</body>
</html>
