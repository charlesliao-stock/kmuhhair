<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約查詢與取消 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="booking-card">
    <h2 class="main-title">預約查詢與取消</h2>
    
    <div class="section-title">輸入查詢資訊</div>
    <div class="info-grid">
        <div class="form-group">
            <label for="searchRoom">病房 / 床號</label>
            <input type="text" id="searchRoom" placeholder="例如: 7F 702-1">
        </div>
        <div class="form-group">
            <label for="searchPhone">連絡電話</label>
            <input type="tel" id="searchPhone" placeholder="預約時填寫的電話">
        </div>
    </div>

    <div class="btn-group">
        <button onclick="performSearch()" id="searchBtn" class="btn-submit">開始查詢</button>
        <a href="index.html" class="btn-cancel">返回首頁</a>
    </div>

    <hr class="divider">

    <div id="resultArea">
        </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        collection, query, where, getDocs, doc, updateDoc, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 狀態轉文字與顏色對應
    const statusConfig = {
        0: { text: '待安排', class: 'status-pending' },
        1: { text: '已派工', class: 'status-dispatched' },
        2: { text: '服務中', class: 'status-active' },
        3: { text: '已完工', class: 'status-completed' },
        4: { text: '已取消', class: 'status-cancelled' }
    };

    window.performSearch = async function() {
        const room = document.getElementById('searchRoom').value.trim();
        const phone = document.getElementById('searchPhone').value.trim();
        const resultArea = document.getElementById('resultArea');
        const btn = document.getElementById('searchBtn');
        
        if(!room || !phone) { alert("請輸入病床號與電話以利查詢"); return; }

        btn.disabled = true;
        btn.innerText = "查詢中...";
        resultArea.innerHTML = '<p class="loading-text">正在檢索資料...</p>';
        
        try {
            // 雙重驗證查詢
            const q = query(collection(db, "Orders"), 
                        where("room", "==", room), 
                        where("phone", "==", phone));
            
            const querySnapshot = await getDocs(q);
            resultArea.innerHTML = '<div class="section-title">查詢結果</div>';

            if (querySnapshot.empty) {
                resultArea.innerHTML += '<p class="empty-text">查無符合條件的預約紀錄。</p>';
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const config = statusConfig[data.status] || { text: '狀態未知', class: '' };

                // 只有狀態為 0 (待安排) 才允許前端取消
                let cancelAction = "";
                if (data.status === 0) {
                    cancelAction = `<button class="btn-outline-cancel" onclick="cancelOrder('${id}')">取消預約</button>`;
                }

                resultArea.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="status-badge ${config.class}">${config.text}</span>
                            <span class="order-date">${data.bookDate} (${data.bookSlot})</span>
                        </div>
                        <div class="order-detail">
                            <p><strong>服務項目：</strong>${data.services.join('、')}</p>
                            <p><strong>特殊需求：</strong>${data.tags.length > 0 ? data.tags.join('、') : '無'}</p>
                            <p><strong>預計金額：</strong><span class="price-text">$${data.totalAmount}</span></p>
                        </div>
                        ${cancelAction}
                    </div>
                `;
            });
        } catch (error) {
            console.error(error);
            resultArea.innerHTML = '<p class="empty-text">系統錯誤，請電洽美髮部專線。</p>';
        } finally {
            btn.disabled = false;
            btn.innerText = "開始查詢";
        }
    }

    window.cancelOrder = async function(id) {
        if (!confirm("確定要取消此筆預約嗎？")) return;
        
        try {
            const orderRef = doc(db, "Orders", id);
            await updateDoc(orderRef, { 
                status: 4, // 4 代表已取消
                updatedAt: serverTimestamp() 
            });
            alert("預約已成功取消。");
            performSearch(); // 重新整理列表
        } catch (error) {
            alert("取消失敗，請電洽美髮部。");
        }
    }
</script>
</body>
</html>
