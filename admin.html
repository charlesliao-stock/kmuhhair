<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中控台 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; background: var(--bg); }
        /* 側邊欄樣式 */
        .sidebar { width: 240px; background: #2c3e50; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 25px; font-size: 1.25rem; font-weight: bold; background: #1a252f; border-bottom: 1px solid #34495e; }
        .nav-group { flex: 1; padding: 15px 0; }
        .nav-item { 
            display: flex; align-items: center; width: 100%; padding: 15px 25px; 
            background: none; border: none; color: #bdc3c7; cursor: pointer; 
            font-size: 1rem; text-decoration: none; transition: 0.2s; 
        }
        .nav-item:hover { background: #34495e; color: white; }
        .nav-item.active { background: var(--primary); color: white; border-left: 5px solid #fff; }
        
        /* 內容顯示區 */
        .main-container { flex: 1; display: flex; flex-direction: column; }
        .top-bar { 
            background: white; padding: 15px 30px; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        /* 功能嵌入區 */
        #content-frame { flex: 1; border: none; width: 100%; height: 100%; background: var(--bg); }
        
        .user-info { font-size: 0.9rem; color: #64748b; }
        .btn-logout { padding: 8px 15px; background: #f1f5f9; border: none; border-radius: 6px; cursor: pointer; color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body class="admin-layout">

    <aside class="sidebar">
        <div class="sidebar-header">美髮部管理中心</div>
        <nav class="nav-group">
            <button class="nav-item active" onclick="loadModule('admin_dispatch.html', this)">
                需求派遣系統
            </button>
            <button class="nav-item" onclick="loadModule('admin_staff.html', this)">
                人員權限管理
            </button>
            <button class="nav-item" onclick="loadModule('admin_schedule.html', this)">
                人員排班管理
            </button>
            <button class="nav-item" onclick="loadModule('admin_config.html', this)">
                網約時段設定
            </button>
            <button class="nav-item" onclick="loadModule('admin_stats.html', this)">
                營業數據統計
            </button>
        </nav>
    </aside>

    <main class="main-container">
        <header class="top-bar">
            <div class="user-info">目前登入：<span id="admin-name">管理員</span></div>
            <button id="logoutBtn" class="btn-logout">登出系統</button>
        </header>
        
        <iframe id="content-frame" src="admin_dispatch.html"></iframe>
    </main>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. 權限與身分檢查
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        // 檢查是否具備 admin 權限
        const userDoc = await getDoc(doc(db, "Users", user.uid || user.email.replace('.','_')));
        if (userDoc.exists() && userDoc.data().role !== 'admin') {
            alert("權限不足，將返回首頁");
            window.location.href = 'index.html';
            return;
        }
        document.getElementById('admin-name').innerText = userDoc.data().name || user.email;
    });

    // 2. 模組切換邏輯
    window.loadModule = function(url, btn) {
        // 切換 iframe 網址
        document.getElementById('content-frame').src = url;
        
        // 切換按鈕樣式
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
    };

    // 3. 登出
    document.getElementById('logoutBtn').addEventListener('click', () => {
        if(confirm("確定要登出管理系統？")) {
            signOut(auth).then(() => { window.location.href = 'login.html'; });
        }
    });
</script>
</body>
</html>
