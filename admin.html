<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統管理後台 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-layout">

<aside class="sidebar">
    <h3>系統管理</h3>
    <nav>
        <button onclick="switchTab('dispatch')">需求派遣</button>
        <button onclick="switchTab('staff')">人員管理</button>
        <button onclick="switchTab('scheduling')">排班管理</button>
        <button onclick="switchTab('web-config')">網約管理</button>
        <button onclick="switchTab('stats')">數據統計</button>
    </nav>
    <button id="logoutBtn" class="btn-cancel" style="margin-top: auto;">登出</button>
</aside>

<main class="content-area">
    <section id="tab-dispatch" class="tab-content active">
        <div class="section-title">即時派遣任務</div>
        <div id="pendingList" class="flex-container"></div>
    </section>

    <section id="tab-staff" class="tab-content">
        <div class="section-title">人員管理</div>
        <div class="card">
            <div class="info-grid">
                <input type="text" id="staffName" placeholder="員工姓名">
                <input type="email" id="staffEmail" placeholder="Email (登入帳號)">
                <button onclick="addStaff()" class="btn-submit">新增人員</button>
            </div>
            <table class="admin-table">
                <thead><tr><th>姓名</th><th>Email</th><th>操作</th></tr></thead>
                <tbody id="staffTableBody"></tbody>
            </table>
        </div>
    </section>

    <section id="tab-scheduling" class="tab-content">
        <div class="section-title">人員循環週班表</div>
        <div class="card overflow-x">
            <table class="schedule-table">
                <thead id="scheduleHead"></thead>
                <tbody id="scheduleBody"></tbody>
            </table>
            <button onclick="saveSchedule()" class="btn-submit" style="margin-top:15px;">儲存班表設定</button>
        </div>
    </section>

    <section id="tab-web-config" class="tab-content">
        <div class="section-title">網約循環週設定</div>
        <div class="card">
            <table class="schedule-table">
                <thead id="webConfigHead"></thead>
                <tbody id="webConfigBody"></tbody>
            </table>
            <button onclick="saveWebConfig()" class="btn-submit" style="margin-top:15px;">儲存網約設定</button>
        </div>
    </section>

    <section id="tab-stats" class="tab-content">
        <div class="section-title">數據統計報表</div>
        <div class="info-grid" style="margin-bottom:20px;">
            <select id="statsRange">
                <option value="day">今日</option>
                <option value="week">本週</option>
                <option value="month">本月</option>
                <option value="quarter">本季</option>
                <option value="year">今年</option>
            </select>
            <button onclick="loadStats()" class="btn-submit">產生報表</button>
        </div>
        <div class="card">
            <canvas id="statsChart"></canvas>
        </div>
    </section>
</main>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, doc, getDocs, setDoc, updateDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- Tab 切換邏輯 ---
    window.switchTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        if(tabId === 'scheduling') loadScheduleData();
        if(tabId === 'staff') loadStaffList();
    };

    // --- 人員管理邏輯 ---
    window.loadStaffList = async () => {
        const snap = await getDocs(query(collection(db, "Users"), where("role", "==", "stylist")));
        const body = document.getElementById('staffTableBody');
        body.innerHTML = '';
        snap.forEach(sDoc => {
            const d = sDoc.data();
            body.innerHTML += `<tr><td>${d.name}</td><td>${d.email}</td><td><button onclick="deleteStaff('${sDoc.id}')">刪除</button></td></tr>`;
        });
    };

    // --- 排班管理 (循環週) ---
    const days = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
    window.loadScheduleData = async () => {
        const head = document.getElementById('scheduleHead');
        const body = document.getElementById('scheduleBody');
        const staffSnap = await getDocs(query(collection(db, "Users"), where("role", "==", "stylist")));
        const staffs = staffSnap.docs.map(d => ({id: d.id, name: d.data().name}));

        head.innerHTML = `<tr><th>時段</th>${days.map(d => `<th>${d}</th>`).join('')}</tr>`;
        
        let html = `<tr><td>是否營業</td>${days.map((d, i) => `<td><input type="checkbox" id="open-${i}"></td>`).join('')}</tr>`;
        html += `<tr><td>上午人員</td>${days.map((d, i) => `<td><select id="am-${i}">${staffs.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select></td>`).join('')}</tr>`;
        html += `<tr><td>下午人員</td>${days.map((d, i) => `<td><select id="pm-${i}">${staffs.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}</select></td>`).join('')}</tr>`;
        body.innerHTML = html;
    };

    // --- 統計功能 (Chart.js) ---
    let myChart;
    window.loadStats = async () => {
        const range = document.getElementById('statsRange').value;
        // 這裡應根據 range 計算日期區間並從 Firestore 撈取資料
        // 以下為示範靜態數據
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['王大明', '李小美', '陳阿姨'],
                datasets: [{ label: '完工件數', data: [12, 19, 3], backgroundColor: '#3498db' }]
            }
        });
    };
</script>

<style>
    .admin-layout { display: flex; min-height: 100vh; background: #f0f2f5; }
    .sidebar { width: 200px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; }
    .sidebar button { background: none; border: none; color: #bdc3c7; padding: 15px; text-align: left; cursor: pointer; font-size: 1rem; border-bottom: 1px solid #34495e; }
    .sidebar button:hover { color: white; background: #34495e; }
    .content-area { flex: 1; padding: 30px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .admin-table, .schedule-table { width: 100%; border-collapse: collapse; background: white; }
    .admin-table th, .admin-table td, .schedule-table th, .schedule-table td { border: 1px solid #eee; padding: 12px; text-align: center; }
    .overflow-x { overflow-x: auto; }
</style>
</body>
</html>
