<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫預約服務 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="booking-card">
    <h2 class="main-title">預約美髮服務</h2>
    
    <form id="bookingForm">
        <div class="section-title">病人資訊</div>
        <div class="info-grid">
            <div class="form-group">
                <label for="room">病房 / 床號</label>
                <input type="text" id="room" required placeholder="例如: 7F 702-1">
            </div>
            <div class="form-group">
                <label for="gender">性別</label>
                <select id="gender">
                    <option value="女">女</option>
                    <option value="男">男</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label for="phone">連絡電話</label>
                <input type="tel" id="phone" required placeholder="請輸入聯絡手機">
            </div>
        </div>

        <div class="section-title">服務項目 (可複選)</div>
        <div id="serviceList" class="flex-container">
            <p class="loading-text">正在載入服務項目...</p>
        </div>

        <div class="total-box" style="margin-top: 15px;">
            預計服務金額：<span class="total-amount" id="totalDisplay">$ 0</span>
        </div>

        <div class="section-title">預約日期與時段</div>
        <div class="datetime-group">
            <input type="date" id="bookDate" required>
            <select id="bookSlot" required>
                <option value="上午">上午</option>
                <option value="下午">下午</option>
            </select>
        </div>

        <div class="section-title">指定美髮師 (可選)</div>
        <div class="flex-container">
            <div class="item-card" style="flex: 0 0 100%;">
                <div class="item-left" style="width: 100%;">
                    <span class="item-name" style="margin-right: 15px; flex-shrink: 0;">選擇美髮師</span>
                    <select id="preferredStylist" style="border: none; background: transparent; padding: 0; width: 100%; font-size: 0.95rem; color: var(--text);">
                        <option value="">不指定 (由系統分配)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section-title">特殊需求 (可複選)</div>
        <div id="tagList" class="flex-container"></div>

        <div class="form-group" style="margin-top:20px;">
            <label for="note" class="sub-label">其他備註 (開放填寫)</label>
            <textarea id="note" rows="3" placeholder="如有其他特殊狀況請註明..."></textarea>
        </div>

        <div class="btn-group">
            <button type="submit" id="submitBtn" class="btn-submit">確認送出預約</button>
            <a href="index.html" class="btn-cancel">取消 (回首頁)</a>
        </div>
    </form>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let webConfig = null;
    const daysArr = ["週一", "週二", "週三", "週四", "週五", "週六", "週日"];

    async function initPage() {
        try {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`;
            
            const dateInput = document.getElementById('bookDate');
            dateInput.value = dateStr;
            dateInput.min = dateStr;

            const configSnap = await getDoc(doc(db, "Settings", "WebConfig"));
            if (configSnap.exists()) {
                webConfig = configSnap.data();
                updateStylistDropdown();
            }

            const serviceSnap = await getDocs(collection(db, "Settings/Services/Items"));
            const serviceList = document.getElementById('serviceList');
            serviceList.innerHTML = '';
            serviceSnap.forEach(docSnap => {
                const data = docSnap.data();
                serviceList.innerHTML += `
                    <label class="item-card">
                        <div class="item-left">
                            <input type="checkbox" name="service" value="${data.name}" data-price="${data.price}">
                            <span class="item-name">${data.name}</span>
                        </div>
                        <span class="item-price">$${data.price}</span>
                    </label>
                `;
            });

            const tagSnap = await getDocs(collection(db, "Settings/Tags/Items"));
            const tagList = document.getElementById('tagList');
            tagList.innerHTML = '';
            tagSnap.forEach(docSnap => {
                const data = docSnap.data();
                const isUrgent = data.name.includes("出院") ? 'urgent-card' : '';
                tagList.innerHTML += `
                    <label class="item-card ${isUrgent}">
                        <div class="item-left">
                            <input type="checkbox" name="tag" value="${data.name}">
                            <span class="item-name">${data.name}</span>
                        </div>
                    </label>
                `;
            });

            document.getElementById('serviceList').addEventListener('change', calculateTotal);
            document.getElementById('bookDate').addEventListener('change', handleDateChange);
            document.getElementById('bookSlot').addEventListener('change', updateStylistDropdown);

        } catch (e) { console.error("初始化失敗", e); }
    }

    // 處理日期變更：檢查是否為營業日
    async function handleDateChange() {
        const dateVal = document.getElementById('bookDate').value;
        if (!dateVal) return;

        const selectedDate = new Date(dateVal);
        let dayIndex = selectedDate.getDay() - 1; 
        if (dayIndex === -1) dayIndex = 6;

        const daySettings = webConfig ? webConfig[`day${dayIndex}`] : null;

        if (daySettings && daySettings.isOpen === false) {
            alert(`抱歉，${daysArr[dayIndex]} 為美髮部公休日，請選擇其他日期。`);
            document.getElementById('bookDate').value = "";
            return;
        }
        updateStylistDropdown();
    }

    function updateStylistDropdown() {
        if (!webConfig) return;
        const dateVal = document.getElementById('bookDate').value;
        const slotVal = document.getElementById('bookSlot').value;
        const stylistSelect = document.getElementById('preferredStylist');
        
        const d = new Date(dateVal);
        let dayIndex = d.getDay() - 1; 
        if (dayIndex === -1) dayIndex = 6;

        const dayData = webConfig[`day${dayIndex}`];
        const staffs = slotVal === "上午" ? (dayData?.amStaffs || []) : (dayData?.pmStaffs || []);

        stylistSelect.innerHTML = '<option value="">不指定 (由系統分配)</option>';
        staffs.forEach(name => {
            stylistSelect.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }

    function calculateTotal() {
        let total = 0;
        document.querySelectorAll('input[name="service"]:checked').forEach(el => {
            total += parseInt(el.getAttribute('data-price') || 0);
        });
        document.getElementById('totalDisplay').innerText = `$ ${total}`;
    }

    function isBookingTimeValid(selectedDate, selectedSlot) {
        if (!webConfig) return true;
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;
        
        const d = new Date(selectedDate);
        let dayIndex = d.getDay() - 1;
        if (dayIndex === -1) dayIndex = 6;
        const dayData = webConfig[`day${dayIndex}`];

        // 檢查是否營業
        if (dayData && dayData.isOpen === false) return false;
        
        if (selectedDate === todayStr) {
            const currentTime = now.getHours() * 100 + now.getMinutes();
            let deadlineStr = selectedSlot === "上午" ? dayData?.amEnd : dayData?.pmEnd;
            let deadline = parseInt((deadlineStr || "16:00").replace(':', ''));

            if (currentTime > deadline) return false;
        }
        return true;
    }

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const selectedDate = document.getElementById('bookDate').value;
        const selectedSlot = document.getElementById('bookSlot').value;

        if (!isBookingTimeValid(selectedDate, selectedSlot)) {
            alert("已超過網路預約的時間，或該日不營業，請電洽美髮部，分機 5300。");
            return;
        }

        const services = Array.from(document.querySelectorAll('input[name="service"]:checked')).map(el => el.value);
        if (services.length === 0) { alert("請至少選擇一項服務項目"); return; }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "正在送出...";

        try {
            await addDoc(collection(db, "Orders"), {
                room: document.getElementById('room').value,
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value,
                services: services,
                tags: Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(el => el.value),
                bookDate: selectedDate,
                bookSlot: selectedSlot,
                preferredStylist: document.getElementById('preferredStylist').value,
                status: 0,
                totalAmount: parseInt(document.getElementById('totalDisplay').innerText.replace('$ ','')),
                createdAt: serverTimestamp()
            });
            alert("預約成功！");
            window.location.href = "index.html";
        } catch (err) {
            alert("預約失敗，請稍後再試。");
            btn.disabled = false;
            btn.innerText = "確認送出預約";
        }
    });

    initPage();
</script>
</body>
</html>
