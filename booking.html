<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫預約服務 - 醫院美髮部</title>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --urgent: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f8f9fa; padding: 15px; }
        .booking-card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .section-title { font-size: 1rem; font-weight: bold; margin: 20px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #34495e; }
        input[type="text"], input[type="tel"], input[type="date"], select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }

        /* 項目複選框樣式 */
        .service-item { display: flex; align-items: center; justify-content: space-between; background: #fdfdfd; border: 1px solid #eee; padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; }
        .service-item input { margin-right: 10px; width: 18px; height: 18px; }
        .price-label { color: var(--primary); font-weight: bold; }

        /* 特殊需求快速選項 */
        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-item { display: flex; align-items: center; background: #f1f2f6; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; border: 1px solid transparent; }
        .tag-item input { margin-right: 5px; }
        .tag-urgent { background: #ffeaa7; border: 1px solid #f1c40f; color: #d35400; font-weight: bold; }

        .total-box { background: #ecf0f1; padding: 15px; border-radius: 6px; text-align: right; margin-top: 20px; }
        .total-amount { font-size: 1.5rem; color: var(--urgent); font-weight: bold; }

        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .btn-submit:disabled { background: #bdc3c7; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>填寫服務預約</h2>
    <form id="bookingForm">
        <div class="form-group">
            <label>病房 / 床號</label>
            <input type="text" id="room" required placeholder="例如: 7F 702-1">
        </div>

        <div class="form-group">
            <label>性別</label>
            <select id="gender">
                <option value="女">女</option>
                <option value="男">男</option>
            </select>
        </div>

        <div class="form-group">
            <label>連絡電話</label>
            <input type="tel" id="phone" required placeholder="請輸入聯絡手機">
        </div>

        <div class="section-title">服務項目 (可複選)</div>
        <div id="serviceList">
            <p style="color:gray;">正在載入服務項目...</p>
        </div>

        <div class="section-title">預約日期與時段</div>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="bookDate" required>
            <select id="bookSlot" required>
                <option value="上午">上午</option>
                <option value="下午">下午</option>
            </select>
        </div>

        <div class="section-title">特殊需求 (預設選項)</div>
        <div class="tag-group" id="tagList">
            </div>

        <div class="form-group" style="margin-top:15px;">
            <label>其他備註</label>
            <textarea id="note" rows="3" placeholder="如有其他特殊狀況請註明..."></textarea>
        </div>

        <div class="total-box">
            預計總金額：<span class="total-amount" id="totalDisplay">$ 0</span>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">確認送出預約</button>
    </form>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        collection, getDocs, addDoc, serverTimestamp, doc, writeBatch 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- 1. 初始化頁面與載入資料 ---
    async function initPage() {
        try {
            // A. 設定預設日期為今日
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('bookDate').value = `${yyyy}-${mm}-${dd}`;

            // B. 載入服務項目
            const serviceSnap = await getDocs(collection(db, "Settings/Services/Items"));
            const serviceList = document.getElementById('serviceList');
            serviceList.innerHTML = '';
            
            if (serviceSnap.empty) {
                serviceList.innerHTML = '<p style="color:orange;">尚未設定服務項目，請先初始化資料庫。</p>';
            }

            serviceSnap.forEach(docSnap => {
                const data = docSnap.data();
                serviceList.innerHTML += `
                    <label class="service-item">
                        <span><input type="checkbox" name="service" value="${data.name}" data-price="${data.price}"> ${data.name}</span>
                        <span class="price-label">$${data.price}</span>
                    </label>
                `;
            });

            // C. 載入特殊需求標籤
            const tagSnap = await getDocs(collection(db, "Settings/Tags/Items"));
            const tagList = document.getElementById('tagList');
            tagList.innerHTML = '';
            
            tagSnap.forEach(docSnap => {
                const data = docSnap.data();
                const isUrgent = data.name === "今日出院" ? 'tag-urgent' : '';
                tagList.innerHTML += `
                    <label class="tag-item ${isUrgent}">
                        <input type="checkbox" name="tag" value="${data.name}"> ${data.name}
                    </label>
                `;
            });

            // D. 動態綁定金額計算監聽 (在元素生成後)
            document.querySelectorAll('input[name="service"]').forEach(el => {
                el.addEventListener('change', calculateTotal);
            });

        } catch (e) {
            console.error("載入失敗", e);
            alert("系統設定載入失敗，請確認 Firebase 設定或稍後再試。");
        }
    }

    // --- 2. 金額累計邏輯 ---
    function calculateTotal() {
        let total = 0;
        document.querySelectorAll('input[name="service"]:checked').forEach(el => {
            total += parseInt(el.getAttribute('data-price') || 0);
        });
        document.getElementById('totalDisplay').innerText = `$ ${total}`;
    }

    // --- 3. 表單送出至 Firestore ---
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        const selectedServices = Array.from(document.querySelectorAll('input[name="service"]:checked')).map(el => el.value);
        const selectedTags = Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(el => el.value);

        if (selectedServices.length === 0) {
            alert("請至少選擇一項服務");
            btn.disabled = false;
            btn.innerText = "確認送出預約";
            return;
        }

        const orderData = {
            room: document.getElementById('room').value,
            gender: document.getElementById('gender').value,
            phone: document.getElementById('phone').value,
            services: selectedServices,
            tags: selectedTags,
            bookDate: document.getElementById('bookDate').value,
            bookSlot: document.getElementById('bookSlot').value,
            note: document.getElementById('note').value,
            status: 0, // 0: 待安排
            totalAmount: parseInt(document.getElementById('totalDisplay').innerText.replace('$ ','')),
            createdAt: serverTimestamp()
        };

        try {
            await addDoc(collection(db, "Orders"), orderData);
            alert("預約成功！美髮部將盡快為您安排。");
            window.location.href = "index.html";
        } catch (err) {
            console.error("送出失敗: ", err);
            alert("送出失敗，請檢查網路連接或電洽美髮部。");
            btn.disabled = false;
            btn.innerText = "確認送出預約";
        }
    });

    // --- 4. 開發者專用：初始化資料庫工具 (F12 Console 呼叫) ---
    window.initDB = async () => {
        if (!confirm("即將初始化資料庫設定，是否繼續？")) return;
        
        const batch = writeBatch(db);
        
        // 定義服務項目
        const services = [
            { id: 's1', name: '剪髮', price: 200 },
            { id: 's2', name: '洗髮', price: 300 },
            { id: 's3', name: '理髮(手術用)', price: 150 }
        ];
        services.forEach(s => {
            batch.set(doc(db, "Settings/Services/Items", s.id), { name: s.name, price: s.price });
        });

        // 定義標籤
        const tags = [
            { id: 't1', name: '今日出院' }, 
            { id: 't2', name: '需在床上洗' },
            { id: 't3', name: '身上有管路' }
        ];
        tags.forEach(t => {
            batch.set(doc(db, "Settings/Tags/Items", t.id), { name: t.name });
        });

        // 定義基礎網約設定
        batch.set(doc(db, "Settings/WebConfig"), { 
            isWebOpen: true,
            updateAt: serverTimestamp()
        });

        try {
            await batch.commit();
            console.log("✅ 資料庫初始化成功！請重新整理頁面。");
            alert("資料庫初始化成功！請重新整理頁面查看項目。");
            location.reload();
        } catch (err) {
            console.error("❌ 初始化失敗:", err);
            alert("初始化失敗，可能是權限不足 (Security Rules) 或網路問題。");
        }
    };

    // 啟動頁面
    initPage();
</script>
</body>
</html>
