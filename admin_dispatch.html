<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求派遣 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dispatch-container { padding: 10px; }
        .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        
        /* 派遣卡片特殊樣式 */
        .dispatch-card {
            background: white; border: 1.5px solid var(--border); border-radius: 12px;
            padding: 15px; display: flex; flex-direction: column; position: relative;
        }
        .dispatch-card.urgent { border-left: 6px solid var(--urgent); background: #fff9f9; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .room-tag { font-size: 1.2rem; font-weight: 800; color: #1e293b; }
        .time-tag { font-size: 0.85rem; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 4px; }
        
        .order-body { flex: 1; font-size: 0.95rem; margin-bottom: 15px; }
        .service-info { color: var(--primary); font-weight: 700; margin: 5px 0; }
        .tag-pill { display: inline-block; font-size: 0.8rem; padding: 2px 8px; background: #e2e8f0; border-radius: 12px; margin-right: 4px; }

        /* 彈窗樣式 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); 
                 display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; }
        .staff-btn { 
            width: 100%; padding: 12px; margin-bottom: 8px; border: 1.5px solid var(--border); 
            background: white; border-radius: 8px; cursor: pointer; text-align: left; font-size: 1rem;
        }
        .staff-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .preferred-stylist { color: #f59e0b; font-weight: 700; font-size: 0.9rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="dispatch-container">
    <div class="section-title">即時待派遣清單</div>
    <div id="noOrderMsg" class="empty-text" style="display:none;">目前沒有待處理的預約。</div>
    <div id="orderGrid" class="order-grid">
        </div>
</div>

<div id="dispatchModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">指派美髮師</h3>
        <p id="targetRoom" style="color:var(--primary); font-weight:700;"></p>
        <div id="staffList" style="margin: 20px 0;">
            </div>
        <button onclick="closeModal()" class="btn-cancel" style="width:100%; padding:12px;">取消</button>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { db } from './firebase-config.js';
    import { 
        collection, query, where, onSnapshot, orderBy, doc, getDoc, updateDoc, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentOrderId = null;
    let webConfig = null;

    // 1. 初始化監聽與設定
    async function initDispatch() {
        const configSnap = await getDoc(doc(db, "Settings", "WebConfig"));
        if (configSnap.exists()) webConfig = configSnap.data();

        listenOrders();
    }

    // 2. 監聽待安排訂單 (status = 0)
    function listenOrders() {
        const q = query(collection(db, "Orders"), where("status", "==", 0), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('orderGrid');
            const noMsg = document.getElementById('noOrderMsg');
            grid.innerHTML = '';
            
            if (snapshot.empty) {
                noMsg.style.display = 'block';
                return;
            }
            noMsg.style.display = 'none';

            // 新增訂單音效提醒
            if (snapshot.docChanges().some(change => change.type === "added")) {
                document.getElementById('alertSound').play().catch(() => {});
            }

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                const isUrgent = data.tags.some(t => t.includes("出院")) ? 'urgent' : '';
                const preferred = data.preferredStylist ? `<div class="preferred-stylist">★ 指定：${data.preferredStylist}</div>` : '';

                grid.innerHTML += `
                    <div class="dispatch-card ${isUrgent}">
                        <div class="card-header">
                            <span class="room-tag">${data.room}</span>
                            <span class="time-tag">${data.bookSlot}</span>
                        </div>
                        <div class="order-body">
                            <div>${data.gender}性 | ${data.phone}</div>
                            <div class="service-info">${data.services.join('、')}</div>
                            <div>${data.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>
                            ${preferred}
                            <div style="font-size:0.85rem; color:#64748b; margin-top:10px;">預約日期：${data.bookDate}</div>
                        </div>
                        <button class="btn-submit" onclick="openDispatchModal('${docSnap.id}', '${data.room}', '${data.bookDate}', '${data.bookSlot}')">
                            指派人員
                        </button>
                    </div>
                `;
            });
        });
    }

    // 3. 開啟指派彈窗
    window.openDispatchModal = (id, room, date, slot) => {
        currentOrderId = id;
        document.getElementById('targetRoom').innerText = `病床：${room} (${slot})`;
        document.getElementById('dispatchModal').style.display = 'flex';
        
        const staffArea = document.getElementById('staffList');
        staffArea.innerHTML = '';

        // 判定星期幾來抓取班表
        const d = new Date(date);
        let dayIndex = d.getDay() - 1;
        if (dayIndex === -1) dayIndex = 6;
        
        const dayData = webConfig ? webConfig[`day${dayIndex}`] : null;
        const staffs = slot === "上午" ? (dayData?.amStaffs || []) : (dayData?.pmStaffs || []);

        if (staffs.length === 0) {
            staffArea.innerHTML = '<p style="color:gray;">當天該時段無排班人員</p>';
        } else {
            staffs.forEach(name => {
                staffArea.innerHTML += `
                    <button class="staff-btn" onclick="confirmDispatch('${name}')">
                        👤 ${name}
                    </button>
                `;
            });
        }
    };

    // 4. 執行指派 (更新狀態為 1)
    window.confirmDispatch = async (stylistName) => {
        if (!confirm(`確定指派給 ${stylistName} 嗎？`)) return;

        try {
            const orderRef = doc(db, "Orders", currentOrderId);
            await updateDoc(orderRef, {
                status: 1, // 已派工
                stylistName: stylistName,
                dispatchedAt: serverTimestamp()
            });
            closeModal();
        } catch (e) {
            alert("指派失敗：" + e.message);
        }
    };

    window.closeModal = () => {
        document.getElementById('dispatchModal').style.display = 'none';
    };

    initDispatch();
</script>
</body>
</html>
