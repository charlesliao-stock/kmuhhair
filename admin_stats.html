<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據統計報表 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-container { padding: 20px; }
        .filter-section { 
            background: white; padding: 20px; border-radius: 12px; 
            margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stats-cards { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .summary-card { 
            background: white; padding: 20px; border-radius: 12px; text-align: center;
            border: 1.5px solid var(--border);
        }
        .summary-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: 10px; }
        .summary-label { color: #64748b; font-weight: 600; }
        
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: white; padding: 20px; border-radius: 12px; border: 1.5px solid var(--border); }
        
        @media (max-width: 800px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="stats-container">
    <div class="section-title">數據統計中心</div>

    <div class="filter-section">
        <div class="info-grid">
            <div class="form-group">
                <label>統計區間</label>
                <select id="timeRange" onchange="handleRangeChange()">
                    <option value="day">今日 (Day)</option>
                    <option value="week">本週 (Week)</option>
                    <option value="month">本月 (Month)</option>
                    <option value="quarter">本季 (Quarter)</option>
                    <option value="year">今年 (Year)</option>
                    <option value="custom">自定義區間</option>
                </select>
            </div>
            <div class="form-group" id="customDateGroup" style="display:none;">
                <label>起訖日期</label>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="startDate">
                    <input type="date" id="endDate">
                </div>
            </div>
            <div class="form-group" style="display:flex; align-items:flex-end;">
                <button onclick="fetchStats()" class="btn-submit" style="width:100%;">產生統計報表</button>
            </div>
        </div>
    </div>

    <div class="stats-cards">
        <div class="summary-card">
            <div class="summary-label">總服務件數</div>
            <div class="summary-value" id="totalCount">0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">預估總營業額</div>
            <div class="summary-value" id="totalRevenue">$ 0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">平均單價 (客單價)</div>
            <div class="summary-value" id="avgPrice">$ 0</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-box">
            <div class="section-title" style="margin-top:0;">總服務項目佔比</div>
            <canvas id="servicePieChart"></canvas>
        </div>
        <div class="chart-box">
            <div class="section-title" style="margin-top:0;">個人工作量統計 (件數)</div>
            <canvas id="staffBarChart"></canvas>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let serviceChart, staffChart;

    // 處理下拉選單變更
    window.handleRangeChange = () => {
        const range = document.getElementById('timeRange').value;
        document.getElementById('customDateGroup').style.display = (range === 'custom') ? 'block' : 'none';
    };

    // 計算日期區間邏輯
    function getDateRange(range) {
        const now = new Date();
        let start = new Date();
        let end = new Date();
        
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);

        if (range === 'day') {
            // 已預設今日
        } else if (range === 'week') {
            const day = start.getDay() || 7;
            start.setDate(start.getDate() - day + 1);
        } else if (range === 'month') {
            start.setDate(1);
        } else if (range === 'quarter') {
            const quarter = Math.floor(start.getMonth() / 3);
            start.setMonth(quarter * 3, 1);
        } else if (range === 'year') {
            start.setMonth(0, 1);
        } else if (range === 'custom') {
            start = new Date(document.getElementById('startDate').value);
            end = new Date(document.getElementById('endDate').value);
            end.setHours(23,59,59,999);
        }
        
        return { 
            startStr: start.toISOString().split('T')[0], 
            endStr: end.toISOString().split('T')[0] 
        };
    }

    // 抓取並分析數據
    window.fetchStats = async () => {
        const range = document.getElementById('timeRange').value;
        const { startStr, endStr } = getDateRange(range);
        
        if (range === 'custom' && (!startStr || !endStr)) return alert("請選擇完整日期區間");

        // 查詢「已完工 (status: 3)」的訂單
        const q = query(
            collection(db, "Orders"),
            where("status", "==", 3),
            where("bookDate", ">=", startStr),
            where("bookDate", "<=", endStr),
            orderBy("bookDate", "asc")
        );

        try {
            const snap = await getDocs(q);
            
            let totalRev = 0;
            const serviceMap = {};
            const staffMap = {};

            snap.forEach(d => {
                const data = d.data();
                totalRev += (data.totalAmount || 0);
                
                // 統計服務項目
                data.services.forEach(s => {
                    serviceMap[s] = (serviceMap[s] || 0) + 1;
                });

                // 統計個人工作量
                const name = data.stylistName || "未指派";
                staffMap[name] = (staffMap[name] || 0) + 1;
            });

            updateUI(snap.size, totalRev, serviceMap, staffMap);
        } catch (e) {
            console.error("統計讀取失敗:", e);
            alert("數據讀取失敗，請檢查索引設定。");
        }
    };

    function updateUI(count, revenue, serviceData, staffData) {
        // 更新卡片數字
        document.getElementById('totalCount').innerText = count;
        document.getElementById('totalRevenue').innerText = `$ ${revenue.toLocaleString()}`;
        document.getElementById('avgPrice').innerText = count > 0 ? `$ ${Math.round(revenue / count)}` : "$ 0";

        renderCharts(serviceData, staffData);
    }

    function renderCharts(serviceData, staffData) {
        const ctxService = document.getElementById('servicePieChart').getContext('2d');
        const ctxStaff = document.getElementById('staffBarChart').getContext('2d');

        if (serviceChart) serviceChart.destroy();
        if (staffChart) staffChart.destroy();

        // 服務項目佔比圖 (Pie)
        serviceChart = new Chart(ctxService, {
            type: 'doughnut',
            data: {
                labels: Object.keys(serviceData),
                datasets: [{
                    data: Object.values(serviceData),
                    backgroundColor: ['#007bff', '#10b981', '#f59e0b', '#dc3545', '#6366f1']
                }]
            }
        });

        // 個人工作量柱狀圖 (Bar)
        staffChart = new Chart(ctxStaff, {
            type: 'bar',
            data: {
                labels: Object.keys(staffData),
                datasets: [{
                    label: '完工件數',
                    data: Object.values(staffData),
                    backgroundColor: 'rgba(0, 123, 255, 0.7)',
                    borderColor: '#007bff',
                    borderWidth: 1
                }]
            },
            options: {
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    // 頁面加載後自動執行一次
    fetchStats();
</script>
</body>
</html>
