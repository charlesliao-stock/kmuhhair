<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據統計報表 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-container { padding: 20px; }
        .filter-section { 
            background: white; padding: 20px; border-radius: 12px; 
            margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .stats-cards { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .summary-card { 
            background: white; padding: 20px; border-radius: 12px; text-align: center;
            border: 1.5px solid var(--border);
        }
        .summary-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: 10px; }
        .summary-label { color: #64748b; font-weight: 600; }
        
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: white; padding: 20px; border-radius: 12px; border: 1.5px solid var(--border); }
        
        .empty-state { text-align: center; color: #94a3b8; padding: 40px 20px; font-style: italic; }
        .loading-spinner { text-align: center; color: #64748b; padding: 20px; }
        
        @media (max-width: 800px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="stats-container">
    <div class="section-title">數據統計中心</div>

    <div class="filter-section">
        <div class="info-grid">
            <div class="form-group">
                <label>統計區間</label>
                <select id="timeRange" onchange="handleRangeChange()">
                    <option value="day">今日 (Day)</option>
                    <option value="week">本週 (Week)</option>
                    <option value="month">本月 (Month)</option>
                    <option value="quarter">本季 (Quarter)</option>
                    <option value="year">今年 (Year)</option>
                    <option value="custom">自定義區間</option>
                </select>
            </div>
            <div class="form-group" id="customDateGroup" style="display:none;">
                <label>起訖日期</label>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="startDate">
                    <input type="date" id="endDate">
                </div>
            </div>
            <div class="form-group" style="display:flex; align-items:flex-end;">
                <button onclick="fetchStats()" class="btn-submit" style="width:100%;">產生統計報表</button>
            </div>
        </div>
    </div>

    <div class="stats-cards">
        <div class="summary-card">
            <div class="summary-label">總服務件數</div>
            <div class="summary-value" id="totalCount">0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">預估總營業額</div>
            <div class="summary-value" id="totalRevenue">$ 0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">平均單價 (客單價)</div>
            <div class="summary-value" id="avgPrice">$ 0</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="chart-box">
            <div class="section-title" style="margin-top:0;">總服務項目佔比</div>
            <div id="servicePieContainer">
                <canvas id="servicePieChart"></canvas>
            </div>
        </div>
        <div class="chart-box">
            <div class="section-title" style="margin-top:0;">個人工作量統計 (件數)</div>
            <div id="staffBarContainer">
                <canvas id="staffBarChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let serviceChart, staffChart;

    // 處理下拉選單變更
    window.handleRangeChange = () => {
        const range = document.getElementById('timeRange').value;
        document.getElementById('customDateGroup').style.display = (range === 'custom') ? 'block' : 'none';
    };

    // 計算日期區間邏輯
    function getDateRange(range) {
        const now = new Date();
        let start = new Date();
        let end = new Date();
        
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);

        if (range === 'day') {
            // 已預設今日
        } else if (range === 'week') {
            const day = start.getDay() || 7;
            start.setDate(start.getDate() - day + 1);
        } else if (range === 'month') {
            start.setDate(1);
        } else if (range === 'quarter') {
            const quarter = Math.floor(start.getMonth() / 3);
            start.setMonth(quarter * 3, 1);
        } else if (range === 'year') {
            start.setMonth(0, 1);
        } else if (range === 'custom') {
            const startInput = document.getElementById('startDate').value;
            const endInput = document.getElementById('endDate').value;
            if (!startInput || !endInput) {
                return null;
            }
            start = new Date(startInput);
            end = new Date(endInput);
            end.setHours(23,59,59,999);
        }
        
        return { 
            startStr: start.toISOString().split('T')[0], 
            endStr: end.toISOString().split('T')[0] 
        };
    }

    // 抓取並分析數據
    window.fetchStats = async () => {
        const range = document.getElementById('timeRange').value;
        const dateRange = getDateRange(range);
        
        if (!dateRange) {
            alert("請選擇完整日期區間");
            return;
        }

        const { startStr, endStr } = dateRange;

        try {
            // 【修復】改進查詢邏輯：分開兩個 where 條件以避免索引問題
            // 先查詢日期範圍內的所有訂單，再在客戶端篩選狀態
            const q = query(
                collection(db, "Orders"),
                where("bookDate", ">=", startStr),
                where("bookDate", "<=", endStr),
                orderBy("bookDate", "asc")
            );

            const snap = await getDocs(q);
            
            let totalRev = 0;
            let completedCount = 0;
            const serviceMap = {};
            const staffMap = {};

            snap.forEach(d => {
                const data = d.data();
                
                // 【修復】只統計已完工的訂單 (status === 3)
                if (data.status !== 3) {
                    return;
                }

                completedCount++;
                totalRev += (data.totalAmount || 0);
                
                // 【修復】確保 services 存在且為陣列
                if (data.services && Array.isArray(data.services)) {
                    data.services.forEach(s => {
                        serviceMap[s] = (serviceMap[s] || 0) + 1;
                    });
                }

                // 【修復】統計個人工作量，排除「未指派」
                const name = data.stylistName || "未指派";
                staffMap[name] = (staffMap[name] || 0) + 1;
            });

            updateUI(completedCount, totalRev, serviceMap, staffMap);
        } catch (e) {
            console.error("統計讀取失敗:", e);
            alert("數據讀取失敗，請檢查網路連線或索引設定。\n錯誤: " + e.message);
        }
    };

    function updateUI(count, revenue, serviceData, staffData) {
        // 更新卡片數字
        document.getElementById('totalCount').innerText = count;
        document.getElementById('totalRevenue').innerText = `$ ${revenue.toLocaleString()}`;
        document.getElementById('avgPrice').innerText = count > 0 ? `$ ${Math.round(revenue / count)}` : "$ 0";

        // 【修復】檢查是否有數據，若無則顯示空狀態
        if (count === 0) {
            document.getElementById('servicePieContainer').innerHTML = '<div class="empty-state">選定期間內無已完成訂單</div>';
            document.getElementById('staffBarContainer').innerHTML = '<div class="empty-state">選定期間內無已完成訂單</div>';
            return;
        }

        renderCharts(serviceData, staffData);
    }

    function renderCharts(serviceData, staffData) {
        const ctxService = document.getElementById('servicePieChart');
        const ctxStaff = document.getElementById('staffBarChart');

        // 【修復】確保 canvas 存在
        if (!ctxService || !ctxStaff) {
            console.error("找不到圖表容器");
            return;
        }

        if (serviceChart) serviceChart.destroy();
        if (staffChart) staffChart.destroy();

        // 【修復】檢查數據是否為空
        const hasServiceData = Object.keys(serviceData).length > 0;
        const hasStaffData = Object.keys(staffData).length > 0;

        // 服務項目佔比圖 (Pie)
        if (hasServiceData) {
            serviceChart = new Chart(ctxService.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(serviceData),
                    datasets: [{
                        data: Object.values(serviceData),
                        backgroundColor: ['#007bff', '#10b981', '#f59e0b', '#dc3545', '#6366f1', '#8b5cf6', '#ec4899']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        } else {
            document.getElementById('servicePieContainer').innerHTML = '<div class="empty-state">無服務項目數據</div>';
        }

        // 個人工作量柱狀圖 (Bar)
        if (hasStaffData) {
            staffChart = new Chart(ctxStaff.getContext('2d'), {
                type: 'bar',
                data: {
                    labels: Object.keys(staffData),
                    datasets: [{
                        label: '完工件數',
                        data: Object.values(staffData),
                        backgroundColor: 'rgba(0, 123, 255, 0.7)',
                        borderColor: '#007bff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            ticks: { stepSize: 1 } 
                        } 
                    },
                    plugins: {
                        legend: {
                            display: true
                        }
                    }
                }
            });
        } else {
            document.getElementById('staffBarContainer').innerHTML = '<div class="empty-state">無人員數據</div>';
        }
    }

    // 頁面加載後自動執行一次
    window.addEventListener('DOMContentLoaded', () => {
        fetchStats();
    });
</script>
</body>
</html>
