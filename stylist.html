<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美髮師工作平台 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --pending: #f59e0b;
            --completed: #10b981;
            --cancelled: #ef4444;
            --waiting: #6366f1;
        }
        .stylist-container { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; overflow-x: auto; }
        .nav-tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #64748b; white-space: nowrap; }
        .nav-tab.active { background: var(--primary); color: white; }
        
        .task-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid #cbd5e1; }
        .task-card.status-1 { border-left-color: var(--pending); }
        .task-card.status-2 { border-left-color: var(--waiting); }
        .task-card.status-3 { border-left-color: var(--completed); }
        .task-card.status-4 { border-left-color: var(--cancelled); }
        .task-card.urgent { background: #fff5f5; border-left-color: #ef4444; }
        
        .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .task-room { font-size: 1.2rem; font-weight: 800; color: #1e293b; }
        .task-badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; color: white; font-weight: bold; }
        
        .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; color: #475569; }
        .task-item { margin-bottom: 4px; }
        .task-label { font-weight: 600; color: #64748b; margin-right: 5px; }
        
        .task-actions { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .btn-action { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; min-width: 80px; }
        .btn-finish { background: var(--completed); color: white; }
        .btn-wait { background: var(--waiting); color: white; }
        .btn-cancel { background: var(--cancelled); color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
        .reason-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-reason { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; text-align: left; }
        .btn-reason:hover { background: #f8fafc; border-color: var(--primary); }

        .stats-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .chart-container { margin-top: 20px; height: 300px; }
        
        #notification-banner { display: none; background: #fef3c7; color: #92400e; padding: 10px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #fde68a; }
    </style>
</head>
<body>

<div id="notification-banner">您有新的派遣任務！</div>

<div class="stylist-container">
    <header class="admin-header" style="margin-bottom: 20px;">
        <div>
            <h2 id="stylistNameDisplay">美髮師工作平台</h2>
            <p id="todayDate" style="color: #64748b; font-size: 0.9rem;"></p>
        </div>
        <button id="logoutBtn" class="btn-small-gray">登出</button>
    </header>

    <nav class="nav-tabs">
        <div class="nav-tab active" onclick="switchTab('todo')">待完成派遣 (<span id="count-todo">0</span>)</div>
        <div class="nav-tab" onclick="switchTab('done')">已完成派遣</div>
        <div class="nav-tab" onclick="switchTab('stats')">統計查詢</div>
    </nav>

    <!-- 待完成派遣 -->
    <div id="tab-todo" class="tab-content">
        <div id="todoList">
            <p class="loading-text">正在載入任務...</p>
        </div>
    </div>

    <!-- 已完成派遣 -->
    <div id="tab-done" class="tab-content" style="display:none;">
        <div id="doneList">
            <p class="loading-text">正在載入紀錄...</p>
        </div>
    </div>

    <!-- 統計查詢 -->
    <div id="tab-stats" class="tab-content" style="display:none;">
        <div class="stats-section">
            <div class="info-grid" style="grid-template-columns: 1fr auto; gap: 10px; align-items: flex-end;">
                <div class="form-group">
                    <label>統計區間</label>
                    <select id="statsRange" onchange="updateStats()">
                        <option value="today">今日</option>
                        <option value="week">本週</option>
                        <option value="month">本月</option>
                    </select>
                </div>
                <button class="btn-submit" onclick="updateStats()">查詢</button>
            </div>
            <div class="chart-container">
                <canvas id="personalChart"></canvas>
            </div>
            <div id="statsDetail" style="margin-top: 20px;">
                <!-- 詳細統計數據 -->
            </div>
        </div>
    </div>
</div>

<!-- 狀態選擇 Modal -->
<div id="statusModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">請選擇理由</h3>
        <div id="reasonContainer" class="reason-list"></div>
        <button class="btn-small-gray" style="width:100%; margin-top: 15px;" onclick="closeModal()">取消</button>
    </div>
</div>

<audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
        collection, query, where, onSnapshot, orderBy, doc, updateDoc, serverTimestamp, getDocs, limit
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let currentStylistName = "";
    let lastOrderCount = -1;
    let myChart = null;

    // 初始化
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        // 取得美髮師姓名 (假設儲存在 displayName 或從 Orders 歷史紀錄找)
        currentStylistName = user.displayName || "美髮師";
        document.getElementById('stylistNameDisplay').innerText = `${currentStylistName} 的工作平台`;
        document.getElementById('todayDate').innerText = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        
        initListeners(currentStylistName);
    });

    function initListeners(name) {
        // 1. 監聽待完成任務 (Status 1:已派遣, 2:待完工/服務中)
        const qTodo = query(
            collection(db, "Orders"),
            where("stylistName", "==", name),
            where("status", "in", [1, 2]),
            orderBy("createdAt", "desc")
        );

        onSnapshot(qTodo, (snap) => {
            renderTodoList(snap);
            updateNotification(snap.size);
        });

        // 2. 監聽今日已完成 (Status 3:已完工)
        const todayStr = new Date().toLocaleDateString('sv-SE');
        const qDone = query(
            collection(db, "Orders"),
            where("stylistName", "==", name),
            where("status", "==", 3),
            where("bookDate", "==", todayStr),
            orderBy("completedAt", "desc")
        );

        onSnapshot(qDone, (snap) => {
            renderDoneList(snap);
        });
    }

    function updateNotification(count) {
        const banner = document.getElementById('notification-banner');
        if (lastOrderCount !== -1 && count > lastOrderCount) {
            banner.style.display = 'block';
            document.getElementById('alertSound').play().catch(()=>{});
            setTimeout(() => banner.style.display = 'none', 5000);
        }
        lastOrderCount = count;
        document.getElementById('count-todo').innerText = count;
    }

    function renderTodoList(snap) {
        const container = document.getElementById('todoList');
        if (snap.empty) {
            container.innerHTML = '<div class="empty-state">目前沒有待處理的派遣任務。</div>';
            return;
        }

        container.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            const isUrgent = data.tags && data.tags.some(t => t.includes("出院"));
            const statusText = data.status === 1 ? "待處理" : `待完工 (${data.waitReason || ''})`;
            
            container.innerHTML += `
                <div class="task-card status-${data.status} ${isUrgent ? 'urgent' : ''}">
                    <div class="task-header">
                        <div class="task-room">${data.room} 床</div>
                        <div class="task-badge status-${data.status}">${statusText}</div>
                    </div>
                    <div class="task-grid">
                        <div class="task-item"><span class="task-label">日期:</span>${data.bookDate} (${data.bookSlot})</div>
                        <div class="task-item"><span class="task-label">性別:</span>${data.gender}</div>
                        <div class="task-item"><span class="task-label">電話:</span>${data.phone}</div>
                        <div class="task-item"><span class="task-label">項目:</span>${(data.services || []).join('、')}</div>
                    </div>
                    <div class="task-item" style="margin-top:8px;"><span class="task-label">特殊需求:</span>${(data.tags || []).join('、')} ${data.note || ''}</div>
                    
                    <div class="task-actions">
                        <button class="btn-action btn-finish" onclick="handleStatus('${d.id}', 3)">完工</button>
                        <button class="btn-action btn-wait" onclick="showReasonModal('${d.id}', 'wait')">待完工</button>
                        <button class="btn-action btn-cancel" onclick="showReasonModal('${d.id}', 'cancel')">取消</button>
                    </div>
                </div>
            `;
        });
    }

    function renderDoneList(snap) {
        const container = document.getElementById('doneList');
        if (snap.empty) {
            container.innerHTML = '<div class="empty-state">今日尚無完工紀錄。</div>';
            return;
        }

        container.innerHTML = '<h3 style="margin-bottom:15px;">今日已完工</h3>';
        snap.forEach(d => {
            const data = d.data();
            container.innerHTML += `
                <div class="task-card status-3">
                    <div class="task-header">
                        <div class="task-room">${data.room} 床</div>
                        <div class="task-badge status-3">已完工</div>
                    </div>
                    <div class="task-grid">
                        <div class="task-item"><span class="task-label">項目:</span>${(data.services || []).join('、')}</div>
                        <div class="task-item"><span class="task-label">完成時間:</span>${data.completedAt?.toDate().toLocaleTimeString() || ''}</div>
                    </div>
                </div>
            `;
        });
    }

    // 狀態處理邏輯
    window.handleStatus = async (id, status, reason = "") => {
        if (status === 3 && !confirm("確定此任務已完工？")) return;
        
        try {
            const updateData = { 
                status: status,
                updatedAt: serverTimestamp()
            };
            
            if (status === 3) updateData.completedAt = serverTimestamp();
            if (status === 2) updateData.waitReason = reason;
            if (status === 4) updateData.cancelReason = reason;

            await updateDoc(doc(db, "Orders", id), updateData);
            closeModal();
        } catch (e) {
            alert("更新失敗: " + e.message);
        }
    };

    // Modal 控制
    let activeOrderId = null;
    window.showReasonModal = (id, type) => {
        activeOrderId = id;
        const modal = document.getElementById('statusModal');
        const title = document.getElementById('modalTitle');
        const container = document.getElementById('reasonContainer');
        
        container.innerHTML = '';
        if (type === 'wait') {
            title.innerText = "待完工理由";
            const reasons = ["病人外出", "檢查", "手術"];
            reasons.forEach(r => {
                container.innerHTML += `<button class="btn-reason" onclick="handleStatus('${id}', 2, '${r}')">${r}</button>`;
            });
        } else {
            title.innerText = "取消理由";
            const reasons = ["病人出院", "病人取消"];
            reasons.forEach(r => {
                container.innerHTML += `<button class="btn-reason" onclick="handleStatus('${id}', 4, '${r}')">${r}</button>`;
            });
        }
        modal.style.display = 'flex';
    };

    window.closeModal = () => {
        document.getElementById('statusModal').style.display = 'none';
    };

    // 頁籤切換
    window.switchTab = (tab) => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        
        event.currentTarget.classList.add('active');
        document.getElementById(`tab-${tab}`).style.display = 'block';
        
        if (tab === 'stats') updateStats();
    };

    // 統計功能
    window.updateStats = async () => {
        const range = document.getElementById('statsRange').value;
        const now = new Date();
        let start = new Date();
        start.setHours(0,0,0,0);

        if (range === 'week') {
            const day = start.getDay() || 7;
            start.setDate(start.getDate() - day + 1);
        } else if (range === 'month') {
            start.setDate(1);
        }

        const startStr = start.toISOString().split('T')[0];
        const q = query(
            collection(db, "Orders"),
            where("stylistName", "==", currentStylistName),
            where("status", "==", 3),
            where("bookDate", ">=", startStr)
        );

        const snap = await getDocs(q);
        const serviceCounts = {};
        let total = 0;

        snap.forEach(d => {
            const data = d.data();
            (data.services || []).forEach(s => {
                serviceCounts[s] = (serviceCounts[s] || 0) + 1;
                total++;
            });
        });

        renderChart(serviceCounts);
        renderStatsDetail(serviceCounts, total);
    };

    function renderChart(data) {
        const ctx = document.getElementById('personalChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(data),
                datasets: [{
                    label: '服務件數',
                    data: Object.values(data),
                    backgroundColor: 'rgba(99, 102, 241, 0.7)',
                    borderColor: '#6366f1',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    function renderStatsDetail(data, total) {
        const container = document.getElementById('statsDetail');
        let html = `<div style="font-weight:bold; margin-bottom:10px;">總計服務：${total} 件</div>`;
        html += '<table class="stats-table" style="width:100%; border-collapse:collapse;">';
        Object.entries(data).forEach(([name, count]) => {
            html += `<tr style="border-bottom:1px solid #eee;"><td style="padding:8px 0;">${name}</td><td style="text-align:right;">${count} 件</td></tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
    }

    document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
</script>
</body>
</html>
