<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網約時段設定 - 醫院美髮部</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .config-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .config-table th, .config-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .help-text { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
<div class="booking-card" style="max-width: 800px;">
    <h2 class="main-title">系統循環設定</h2>
    <p class="help-text">此處設定每週一至週日各時段的預約截止時間。<br>若超過設定時間，病人於預約端將無法送出今日預約。</p>

    <div class="section-title">網約受理截止時間 (週循環)</div>
    <div class="card-padding overflow-x">
        <table class="config-table">
            <thead>
                <tr>
                    <th>星期</th>
                    <th>上午截止時間 (預設 11:30)</th>
                    <th>下午截止時間 (預設 16:00)</th>
                </tr>
            </thead>
            <tbody id="webConfigBody">
                </tbody>
        </table>
    </div>

    <div class="btn-group">
        <button onclick="saveTimeSettings()" class="btn-submit">儲存時間設定</button>
        <a href="admin_main.html" class="btn-cancel">回管理首頁</a>
    </div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const days = ["週一", "週二", "週三", "週四", "週五", "週六", "週日"];

    async function init() {
        renderWebConfig();
        
        // 載入現有設定
        try {
            const cfgSnap = await getDoc(doc(db, "Settings", "WebConfig"));
            if (cfgSnap.exists()) {
                const data = cfgSnap.data();
                days.forEach((_, i) => {
                    const dayData = data[`day${i}`];
                    if (dayData) {
                        if (dayData.amEnd) document.getElementById(`amEnd-${i}`).value = dayData.amEnd;
                        if (dayData.pmEnd) document.getElementById(`pmEnd-${i}`).value = dayData.pmEnd;
                    }
                });
            }
        } catch (e) {
            console.error("載入設定失敗", e);
        }
    }

    function renderWebConfig() {
        const body = document.getElementById('webConfigBody');
        body.innerHTML = days.map((day, i) => `
            <tr>
                <td><strong>${day}</strong></td>
                <td><input type="time" id="amEnd-${i}" value="11:30"></td>
                <td><input type="time" id="pmEnd-${i}" value="16:00"></td>
            </tr>
        `).join('');
    }

    window.saveTimeSettings = async () => {
        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerText = "正在儲存...";

        try {
            // 先讀取舊有的設定，以免覆蓋掉排班人員資料 (amStaffs/pmStaffs)
            const docRef = doc(db, "Settings", "WebConfig");
            const configSnap = await getDoc(docRef);
            let currentConfig = configSnap.exists() ? configSnap.data() : {};

            days.forEach((_, i) => {
                const dayKey = `day${i}`;
                if (!currentConfig[dayKey]) currentConfig[dayKey] = {};

                // 更新時間欄位
                currentConfig[dayKey].amEnd = document.getElementById(`amEnd-${i}`).value;
                currentConfig[dayKey].pmEnd = document.getElementById(`pmEnd-${i}`).value;
            });

            await setDoc(docRef, currentConfig);
            alert("網約受理時間設定儲存成功！");
        } catch (e) {
            alert("儲存失敗: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "儲存時間設定";
        }
    };

    init();
</script>
</body>
</html>
